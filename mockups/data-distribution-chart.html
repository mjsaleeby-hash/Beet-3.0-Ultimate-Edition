<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beet's Backup - Data Distribution View</title>
<style>
/* ============================================================
   DATA DISTRIBUTION VIEW - PIE CHART MOCKUP
   Toggle between standard list view and visual pie chart
   showing the 15 largest items in the current location.
   ============================================================ */

/* --- Theme System --- */
:root {
  --bg: #1a1a2e;
  --surface: #242438;
  --panel: #1e1e30;
  --panel-hover: #2a2a42;
  --border: #35354a;
  --border-subtle: #2a2a3e;
  --text-primary: #eaeaef;
  --text-secondary: #8888a0;
  --text-tertiary: #5a5a72;
  --accent: #4CC2FF;
  --accent-hover: #60CDFF;
  --accent-dim: rgba(76, 194, 255, 0.12);
  --selection: #1a3a52;
  --selection-hover: #223e58;
  --toolbar: #222236;
  --success: #4ade80;
  --warning: #f59e0b;
  --danger: #f87171;
  --scrollbar-track: #1e1e30;
  --scrollbar-thumb: #3a3a50;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --bg: #f0f0f5;
  --surface: #ffffff;
  --panel: #e8e8f0;
  --panel-hover: #dddde8;
  --border: #d0d0dc;
  --border-subtle: #e0e0ea;
  --text-primary: #1a1a2e;
  --text-secondary: #6b6b80;
  --text-tertiary: #9999aa;
  --accent: #0078D4;
  --accent-hover: #106EBE;
  --accent-dim: rgba(0, 120, 212, 0.08);
  --selection: #d0e4f7;
  --selection-hover: #bdd8f0;
  --toolbar: #f6f6fa;
  --success: #16a34a;
  --warning: #d97706;
  --danger: #dc2626;
  --scrollbar-track: #f0f0f5;
  --scrollbar-thumb: #c0c0cc;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* --- 15-color palette for chart slices --- */
:root {
  --slice-0: #4CC2FF;
  --slice-1: #FF6B8A;
  --slice-2: #4ade80;
  --slice-3: #f59e0b;
  --slice-4: #a78bfa;
  --slice-5: #f87171;
  --slice-6: #38bdf8;
  --slice-7: #fb923c;
  --slice-8: #34d399;
  --slice-9: #e879f9;
  --slice-10: #fbbf24;
  --slice-11: #60a5fa;
  --slice-12: #c084fc;
  --slice-13: #2dd4bf;
  --slice-14: #94a3b8;
}

/* --- Top bar --- */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--toolbar);
  border-bottom: 1px solid var(--border);
  min-height: 40px;
}

.toolbar .app-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-right: auto;
}
.toolbar .app-title span { color: var(--accent); }

.theme-toggle {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.theme-toggle:hover { color: var(--text-primary); border-color: var(--accent); }

/* --- Breadcrumb / path bar --- */
.pathbar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.pathbar .segment {
  color: var(--text-secondary);
  padding: 2px 6px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.pathbar .segment:hover { color: var(--accent); background: var(--accent-dim); }
.pathbar .segment.current { color: var(--text-primary); font-weight: 600; }
.pathbar .sep { color: var(--text-tertiary); font-size: 11px; }

/* --- View toggle button group --- */
.view-toggle-group {
  display: flex;
  align-items: center;
  margin-left: auto;
  gap: 0;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.view-toggle-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.view-toggle-btn:not(:last-child)::after {
  content: '';
  position: absolute;
  right: 0;
  top: 4px;
  bottom: 4px;
  width: 1px;
  background: var(--border);
}
.view-toggle-btn:hover { color: var(--text-primary); background: var(--panel-hover); }
.view-toggle-btn.active {
  color: var(--accent);
  background: var(--accent-dim);
  font-weight: 600;
}
.view-toggle-btn svg { width: 14px; height: 14px; }

/* --- Main content area --- */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* --- Panes --- */
.pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.pane:last-child { border-right: none; }

.pane-header {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-subtle);
  font-size: 12px;
  color: var(--text-secondary);
  gap: 12px;
}
.pane-header .location { font-weight: 600; color: var(--text-primary); }
.pane-header .item-count { color: var(--text-tertiary); }

.pane-body {
  flex: 1;
  overflow: auto;
  position: relative;
}

.pane-body::-webkit-scrollbar { width: 8px; }
.pane-body::-webkit-scrollbar-track { background: var(--scrollbar-track); }
.pane-body::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

/* --- List view --- */
.list-view { display: flex; flex-direction: column; }

.list-header {
  display: grid;
  grid-template-columns: 28px 1fr 90px 140px;
  padding: 4px 12px;
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 1;
}

.list-row {
  display: grid;
  grid-template-columns: 28px 1fr 90px 140px;
  padding: 3px 12px;
  font-size: 13px;
  align-items: center;
  cursor: pointer;
  transition: background 0.1s;
  border-bottom: 1px solid transparent;
}
.list-row:hover { background: var(--selection-hover); }

.list-row .icon { font-size: 16px; text-align: center; }
.list-row .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-row .size { color: var(--text-secondary); text-align: right; font-variant-numeric: tabular-nums; }
.list-row .date { color: var(--text-tertiary); font-size: 12px; }

/* --- Chart view --- */
.chart-view {
  display: none;
  flex-direction: column;
  height: 100%;
  padding: 20px;
  gap: 20px;
}
.chart-view.active { display: flex; }
.list-view.hidden { display: none; }

.chart-container {
  display: flex;
  gap: 32px;
  flex: 1;
  min-height: 0;
  align-items: center;
}

/* --- Pie chart --- */
.pie-wrapper {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.pie-svg {
  width: 320px;
  height: 320px;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.2));
}

.pie-svg .slice {
  transition: opacity 0.15s, transform 0.15s;
  transform-origin: 160px 160px;
  cursor: pointer;
}
.pie-svg .slice:hover {
  opacity: 0.85;
  transform: scale(1.02);
}

.pie-center-label {
  font-size: 13px;
  color: var(--text-secondary);
  text-align: center;
}
.pie-center-label strong {
  display: block;
  font-size: 22px;
  color: var(--text-primary);
  font-weight: 700;
}

/* --- Legend list --- */
.legend {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
  min-width: 0;
}

.legend-item {
  display: grid;
  grid-template-columns: 14px 1fr 70px 60px;
  gap: 10px;
  align-items: center;
  padding: 7px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.1s;
  font-size: 13px;
  position: relative;
  overflow: hidden;
}
.legend-item:hover { background: var(--selection-hover); }

/* Size bar behind each legend item */
.legend-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: var(--bar-width, 0%);
  opacity: 0.07;
  border-radius: 6px;
  background: var(--bar-color, var(--accent));
  transition: width 0.3s ease;
}

.legend-swatch {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}

.legend-name {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.legend-size {
  text-align: right;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
  font-size: 12px;
}

.legend-pct {
  text-align: right;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-size: 12px;
}

/* --- Chart title bar --- */
.chart-title-bar {
  display: flex;
  align-items: center;
  gap: 12px;
}
.chart-title { font-size: 15px; font-weight: 600; }
.chart-subtitle { font-size: 12px; color: var(--text-tertiary); }

/* --- Status bar --- */
.statusbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 4px 12px;
  background: var(--toolbar);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-tertiary);
  min-height: 28px;
}
.statusbar .spacer { flex: 1; }

/* --- Right pane dimmed to focus on left --- */
.pane.secondary { opacity: 0.7; }
.pane.secondary:hover { opacity: 1; transition: opacity 0.2s; }

/* --- Tooltip --- */
.chart-tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  box-shadow: var(--shadow-lg);
  font-size: 12px;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.12s;
  max-width: 240px;
}
.chart-tooltip.visible { opacity: 1; }
.chart-tooltip .tt-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.chart-tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; color: var(--text-secondary); }
.chart-tooltip .tt-val { color: var(--text-primary); font-weight: 500; }

/* --- Animations --- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.chart-view.active { animation: fadeIn 0.2s ease; }

@media (max-width: 900px) {
  .chart-container { flex-direction: column; align-items: stretch; }
  .pie-wrapper { align-self: center; }
}
</style>
</head>

  { name: "backup-log.txt",   icon: "\u{1F4C4}", size: 24,   unit: "MB", date: "2026-03-24" },
  { name: "manifest.json",    icon: "\u{1F4C4}", size: 1.2,  unit: "MB", date: "2026-03-24" },
  { name: "checksums.sha256", icon: "\u{1F4C4}", size: 0.5,  unit: "MB", date: "2026-03-24" },
  { name: "README.md",        icon: "\u{1F4C4}", size: 4,    unit: "KB", date: "2026-03-01" },
];

const COLORS = [
  '#4CC2FF', '#FF6B8A', '#4ade80', '#f59e0b', '#a78bfa',
  '#f87171', '#38bdf8', '#fb923c', '#34d399', '#e879f9'
];

// Currently active items for the left pane
let activeItems = [...folderItems];

// ============================================================
//  HELPERS
// ============================================================
function sizeToGB(size, unit) {
  if (unit === 'GB') return size;
  if (unit === 'MB') return size / 1024;
  if (unit === 'KB') return size / (1024 * 1024);
  return size;
}

function formatSize(size, unit) {
  if (unit === 'KB') return size + ' KB';
  if (unit === 'MB') return size < 1 ? (size * 1024).toFixed(0) + ' KB' : size.toFixed(1) + ' MB';
  if (unit === 'GB') return size < 0.1 ? (size * 1024).toFixed(0) + ' MB' : size.toFixed(1) + ' GB';
  return size + ' ' + unit;
}

// ============================================================
//  POPULATE LIST VIEWS
// ============================================================
function populateList(containerId, items) {
  const container = document.getElementById(containerId);
  // Remove old rows but keep header
  container.querySelectorAll('.list-row').forEach(r => r.remove());
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'list-row';
    row.innerHTML =
      '<span class="icon">' + item.icon + '</span>' +
      '<span class="name">' + item.name + '</span>' +
      '<span class="size">' + formatSize(item.size, item.unit) + '</span>' +
      '<span class="date">' + item.date + '</span>';
    container.appendChild(row);
  });
}

populateList('list-view', activeItems);
populateList('right-list', rightItems);

// ============================================================
//  PIE CHART (pure SVG)
// ============================================================
function buildPieChart() {
  const svg = document.getElementById('pie-chart');
  const legend = document.getElementById('legend');
  svg.innerHTML = '';
  legend.innerHTML = '';

  // Top 15 by size
  const sorted = [...activeItems]
    .map(it => ({ ...it, gb: sizeToGB(it.size, it.unit) }))
    .sort((a, b) => b.gb - a.gb)
    .slice(0, 10);

  const total = sorted.reduce((s, it) => s + it.gb, 0);
  const cx = 160, cy = 160, r = 140;
  let cumAngle = -Math.PI / 2; // start at 12 o'clock

  sorted.forEach((item, i) => {
    const pct = item.gb / total;
    const angle = pct * 2 * Math.PI;
    const x1 = cx + r * Math.cos(cumAngle);
    const y1 = cy + r * Math.sin(cumAngle);
    const x2 = cx + r * Math.cos(cumAngle + angle);
    const y2 = cy + r * Math.sin(cumAngle + angle);
    const largeArc = angle > Math.PI ? 1 : 0;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + cx + ' ' + cy + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2 + ' Z');
    path.setAttribute('fill', COLORS[i]);
    path.setAttribute('class', 'slice');
    path.dataset.index = i;

    path.addEventListener('mouseenter', function(e) { showTooltip(e, item, pct); highlightLegend(i, true); });
    path.addEventListener('mousemove', moveTooltip);
    path.addEventListener('mouseleave', function() { hideTooltip(); highlightLegend(i, false); });

    svg.appendChild(path);
    cumAngle += angle;

    // Legend entry
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.id = 'legend-' + i;
    div.style.setProperty('--bar-width', (pct * 100).toFixed(1) + '%');
    div.style.setProperty('--bar-color', COLORS[i]);
    div.innerHTML =
      '<span class="legend-swatch" style="background:' + COLORS[i] + '"></span>' +
      '<span class="legend-name">' + item.icon + ' ' + item.name + '</span>' +
      '<span class="legend-size">' + formatSize(item.size, item.unit) + '</span>' +
      '<span class="legend-pct" style="color:' + COLORS[i] + '">' + (pct * 100).toFixed(1) + '%</span>';

    div.addEventListener('mouseenter', function(e) { showTooltip(e, item, pct); highlightSlice(i, true); });
    div.addEventListener('mousemove', moveTooltip);
    div.addEventListener('mouseleave', function() { hideTooltip(); highlightSlice(i, false); });
    legend.appendChild(div);
  });
}

buildPieChart();

// ============================================================
//  TOOLTIP
// ============================================================
const tooltip = document.getElementById('tooltip');

function showTooltip(e, item, pct) {
  document.getElementById('tt-name').textContent = item.name;
  document.getElementById('tt-size').textContent = formatSize(item.size, item.unit);
  document.getElementById('tt-pct').textContent = (pct * 100).toFixed(1) + '%';
  document.getElementById('tt-items').textContent = item.items != null ? item.items.toLocaleString() : '\u2014';
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); }

// ============================================================
//  CROSS-HIGHLIGHTING
// ============================================================
function highlightLegend(i, on) {
  const el = document.getElementById('legend-' + i);
  if (el) el.style.background = on ? 'var(--selection)' : '';
}

function highlightSlice(i, on) {
  const slice = document.querySelector('.slice[data-index="' + i + '"]');
  if (slice) {
    slice.style.opacity = on ? '0.8' : '';
    slice.style.transform = on ? 'scale(1.03)' : '';
  }
}

// ============================================================
//  VIEW SWITCHING
// ============================================================
function switchView(mode) {
  const listView = document.getElementById('list-view');
  const chartView = document.getElementById('chart-view');
  const btnList = document.getElementById('btn-list');
  const btnChart = document.getElementById('btn-chart');
  const statusText = document.getElementById('status-text');

  if (mode === 'chart') {
    listView.classList.add('hidden');
    chartView.classList.add('active');
    btnList.classList.remove('active');
    btnChart.classList.add('active');
    statusText.textContent = 'Visual mode \u2014 showing top 10 largest items by size';
  } else {
    listView.classList.remove('hidden');
    chartView.classList.remove('active');
    btnList.classList.add('active');
    btnChart.classList.remove('active');
    statusText.textContent = 'Ready';
  }
}

// ============================================================
//  THEME TOGGLE
// ============================================================
function toggleTheme() {
  const html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'light' ? '' : 'light');
}

// ============================================================
//  PATH SEGMENT CLICK â€” switch between drive root & folder
// ============================================================
document.querySelectorAll('.pathbar .segment').forEach(function(seg) {
  seg.addEventListener('click', function() {
    if (seg.dataset.path === 'drive') {
      loadContext(driveItems, 'C:\\', '15 items \u00b7 335.1 GB', 'Top 10 largest folders on C: drive', '335.1 GB', 'total on drive');
      document.querySelectorAll('.pathbar .segment').forEach(function(s) { s.classList.remove('current'); });
      seg.classList.add('current');
    } else if (seg.dataset.path === 'docs') {
      loadContext(folderItems, 'C:\\Users\\Owner\\Documents', '24 items \u00b7 187.4 GB', 'Top 10 largest items in Documents', '187.4 GB', 'total in folder');
      document.querySelectorAll('.pathbar .segment').forEach(function(s) { s.classList.remove('current'); });
      seg.classList.add('current');
    }
  });
});

function loadContext(items, location, countText, subtitle, totalSize, totalLabel) {
  activeItems = [...items];
  document.querySelector('.pane-header .location').textContent = location;
  document.querySelector('.pane-header .item-count').textContent = countText;
  document.querySelector('.chart-subtitle').textContent = subtitle;
  document.querySelector('.pie-center-label strong').textContent = totalSize;
  document.querySelector('.pie-center-label').lastChild.textContent = '\n' + totalLabel;
  populateList('list-view', activeItems);
  buildPieChart();
}
</script>
